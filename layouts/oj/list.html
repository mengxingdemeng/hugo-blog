{{ define "main" }}
<div class="container py-4">
  <h1>{{ .Title }}</h1>
  <p class="text-secondary">{{ .Description }}</p>

  <!-- 折线图容器 -->
  <div id="vjudge-chart" style="width:100%;height:450px;margin:2rem 0;"></div>

  <h2>每日刷题明细</h2>
  <div class="table-responsive mt-3">
    <table class="table table-striped">
      <thead>
        <tr>
          <th>日期</th>
          <th>当日做题数</th>
          <th>累计总题数</th>
        </tr>
      </thead>
      <tbody id="record-table">
      </tbody>
    </table>
  </div>
</div>

<!-- 引入ECharts CDN -->
<script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
<script>
// 加载本地生成的刷题json数据
fetch("/data/vjudge-record.json")
.then(res => res.json())
.then(data => {
  // 渲染折线图
  const chartDom = document.getElementById('vjudge-chart');
  const myChart = echarts.init(chartDom);
  const option = {
    title: { text: 'Vjudge 每日刷题趋势' },
    tooltip: { trigger: 'axis' },
    xAxis: { type: 'category', data: data.dateList },
    yAxis: { type: 'value', name: '当日刷题数量' },
    series: [
      {
        name: '当日刷题',
        type: 'line',
        smooth: true,
        data: data.countList
      }
    ]
  };
  myChart.setOption(option);
  window.addEventListener('resize', ()=>myChart.resize());

  // 渲染表格
  const table = document.getElementById('record-table');
  data.records.forEach(item => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${item.date}</td><td>${item.daily}</td><td>${item.total}</td>`;
    table.appendChild(tr);
  })
})
</script>
{{ end }}
