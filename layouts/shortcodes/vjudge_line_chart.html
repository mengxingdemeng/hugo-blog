<div class="fi-card mt-4" data-json-path="{{ "data/vjudge-record.json" | relURL }}" style="padding: 2rem;">
  <!-- 折线图容器 -->
  <div id="vjudge-chart" style="width: 100%; height: 450px; margin: 2rem 0; border: 1px solid #444; border-radius: 8px;"></div>

  <h2>每日刷题明细</h2>
  <div class="table-responsive mt-3">
    <table class="table table-dark table-striped">
      <thead>
        <tr>
          <th>日期</th>
          <th>当日做题数</th>
          <th>累计总题数</th>
        </tr>
      </thead>
      <tbody id="record-table"></tbody>
    </table>
  </div>
</div>

<!-- 国内稳定ECharts CDN，解决国外cdn加载失败 -->
<script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
<script>
// 等待页面完整渲染再执行JS，FixIt深色主题适配
document.addEventListener('DOMContentLoaded', function () {
  const wrap = document.querySelector('[data-json-path]');
  const jsonUrl = wrap.dataset.jsonPath;

  // 页面加载提示
  wrap.insertAdjacentHTML('beforeend', `<div class="alert alert-info mt-3">正在加载刷题统计数据...</div>`);

  fetch(jsonUrl)
  .then(res => {
    if (!res.ok) throw new Error("数据文件缺失，请先运行Python抓取脚本生成 vjudge-record.json");
    return res.json();
  })
  .then(data => {
    // 移除加载提示
    document.querySelector(".alert-info").remove();

    // 初始化深色图表
    const chartDom = document.getElementById('vjudge-chart');
    const myChart = echarts.init(chartDom, "dark");
    const option = {
      title: {
        text: "Vjudge 每日刷题趋势",
        textStyle: { color: "#ccc" }
      },
      tooltip: { trigger: "axis" },
      xAxis: {
        type: "category",
        data: data.dateList,
        axisLine: { lineStyle: { color: "#666" } }
      },
      yAxis: {
        type: "value",
        name: "当日刷题数量",
        axisLine: { lineStyle: { color: "#666" } }
      },
      series: [
        {
          name: "当日刷题",
          type: "line",
          smooth: true,
          data: data.countList,
          lineStyle: { width: 3 },
          itemStyle: { color: "#42b983" }
        }
      ]
    };
    myChart.setOption(option);
    window.addEventListener("resize", () => myChart.resize());

    // 渲染每日刷题表格
    const tableBody = document.getElementById("record-table");
    data.records.forEach(item => {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${item.date}</td><td>${item.daily}</td><td>${item.total}</td>`;
      tableBody.appendChild(tr);
    });
  })
  .catch(err => {
    wrap.insertAdjacentHTML('beforeend', `<div class="alert alert-danger mt-3">加载异常：${err.message}</div>`);
    console.error("数据读取失败：", err);
  });
})
</script>
